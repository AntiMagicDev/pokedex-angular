<div
  class="h-60 bg-blue-900 border-6 border-blue-300 rounded-lg shadow-sm shadow-black p-4 flex items-center justify-center"
>
  @if (selected()) {
    <div class="flex flex-col items-center gap-2">
      <img
        class="w-32 h-32 object-contain"
        [alt]="selected()!.name"
        [src]="
          'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' +
          selected()!.id +
          '.png'
        "
      />
      <span class="text-white font-ds-digi text-xl uppercase">{{ selected()!.name }}</span>
    </div>
  } @else {
    <div class="flex flex-col items-center gap-2">
      <div
        class="w-32 h-32 bg-blue-700 rounded-lg border-4 border-blue-300 flex items-center justify-center"
      >
        <span class="text-white font-ds-digi text-lg">No Selection</span>
      </div>
      <span class="text-white font-ds-digi text-xl uppercase">Select a Pokémon</span>
    </div>
  }
</div>
